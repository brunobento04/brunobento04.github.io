<?xml version="1.0" encoding="UTF-8"?>
<!--
  Bruno Bento - a marca e a junta.
  A chapa, dividida em 63,33% pela costura. O site esta soldando; o icone e a
  peca ja soldada: o cordao ambar ficou. Mesmas cores do banner, nos dois temas.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32"
     role="img" aria-label="Bruno Bento">
  <style>
    .plate  { fill: #fbfcfd; }
    .recess { fill: #e9edf1; }
    .edge   { stroke: #dae0e7; }
    @media (prefers-color-scheme: dark) {
      .plate  { fill: #171c22; }
      .recess { fill: #0e1217; }
      .edge   { stroke: #242b32; }
    }
  </style>

  <!-- a chapa: o lado humano -->
  <rect class="plate" width="32" height="32" rx="7"/>

  <!-- o lado maquina, rebaixado (63,33% de 32 = 20,27) -->
  <path class="recess" d="M20.3 0H25a7 7 0 0 1 7 7v18a7 7 0 0 1-7 7h-4.7z"/>

  <!-- o cordao de solda -->
  <rect x="19.3" y="0" width="2" height="32" fill="#f4780f"/>

  <!-- o fio da borda -->
  <rect class="edge" x=".5" y=".5" width="31" height="31" rx="6.5" fill="none" stroke-width="1"/>
</svg>
