<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex">
<title>4Evolut · Painel de gestão (demonstração)</title>
<meta name="description" content="Demonstração navegável de um painel de gestão multi-segmento: agenda, clientes e financeiro. Dados fictícios, 100% no navegador.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='24' fill='%230d1b3e'/%3E%3Cpath d='M50 24 30 54h16l-4 22 24-32H50z' fill='%232563eb'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================================
   4Evolut · painel de gestão (DEMO). Product UI: crisp, denso, rápido.
   Regência: emil (motion com propósito, :active, skeleton) + impeccable-product
   (sem card aninhado, tabela com divide-y, contraste AA, cards 14px).
   Animação: só transform/opacity, ease-out custom, sem bounce, < 300ms.
   Nenhuma cor pura (preto/branco absolutos). Ícones: uma família SVG (estilo lucide).
   ========================================================================== */

:root{
  /* superfícies */
  --bg:        #eaeef5;
  --surface:   #fbfcfe;
  --surface-2: #f1f4fa;   /* fills, hover de linha, base do skeleton */
  --navy:      #0d1b3e;   /* sidebar, texto forte de marca */
  --navy-2:    #16264d;

  /* tinta */
  --ink:       #101b34;
  --ink-2:     #33415d;
  --muted:     #64748b;
  --line:      #e2e8f1;

  /* ação e status */
  --accent:      #2563eb;
  --accent-ink:  #1d4ed8;
  --accent-soft: #e6effe;
  --success:      #10b981;
  --success-ink:  #047857;
  --success-soft: #d9f7ec;
  --danger:      #e11d48;
  --danger-ink:  #be123c;
  --danger-soft: #fde4ea;
  --amber-ink:   #b45309;
  --amber-soft:  #fbf0d9;

  /* sidebar */
  --side-fg:      #c3d0e8;
  --side-fg-soft: #8a9bc0;
  --side-fg-on:   #eef3fc;

  /* raio, sombra, motion */
  --r-card: 14px;
  --r-sm:   10px;
  --r-pill: 999px;
  --sh-1: 0 1px 2px rgba(13,27,62,.06), 0 1px 3px rgba(13,27,62,.05);
  --sh-2: 0 12px 34px rgba(13,27,62,.14);
  --ease: cubic-bezier(.23,1,.32,1);   /* strong ease-out, sem bounce */
  --t: 160ms;
}

*,*::before,*::after{box-sizing:border-box;}
html,body{height:100%;}
body{
  margin:0;
  background:var(--bg);
  color:var(--ink);
  font-family:'Plus Jakarta Sans',system-ui,-apple-system,'Segoe UI',sans-serif;
  font-size:14px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4,p{margin:0;}
button{font:inherit;color:inherit;}
.ico{width:1em;height:1em;display:inline-block;fill:none;stroke:currentColor;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round;vertical-align:-.14em;flex-shrink:0;}
:where(button,a,input,select):focus-visible{outline:2px solid var(--accent-ink);outline-offset:2px;border-radius:4px;}

/* ── shell ────────────────────────────────────────────────────────────────── */
.app{display:grid;grid-template-columns:240px 1fr;min-height:100dvh;}

.side{
  background:var(--navy);
  color:var(--side-fg);
  display:flex;flex-direction:column;
  padding:16px 12px;
  position:sticky;top:0;height:100dvh;
}
.brand{display:flex;align-items:center;gap:10px;padding:6px 8px 18px;}
.brand__mark{width:34px;height:34px;border-radius:9px;background:linear-gradient(150deg,var(--accent),#3b82f6);
  display:grid;place-items:center;color:var(--side-fg-on);font-size:19px;flex-shrink:0;box-shadow:0 6px 14px rgba(37,99,235,.4);}
.brand__name{font-family:'Outfit',sans-serif;font-weight:800;font-size:17px;letter-spacing:-.4px;color:var(--side-fg-on);}
.brand__name b{color:#7aa5ff;font-weight:800;}
.brand__sub{font-size:11px;color:var(--side-fg-soft);font-weight:600;letter-spacing:.2px;}

.nav{display:flex;flex-direction:column;gap:3px;margin-top:6px;}
.nav__cap{font-size:10.5px;text-transform:uppercase;letter-spacing:1.4px;color:var(--side-fg-soft);font-weight:700;padding:12px 10px 6px;}
.nav__item{
  display:flex;align-items:center;gap:11px;
  padding:10px 11px;border-radius:var(--r-sm);
  color:var(--side-fg);background:transparent;border:0;width:100%;text-align:left;cursor:pointer;
  font-weight:600;font-size:14px;
  transition:background var(--t) ease,color var(--t) ease;
}
.nav__item .ico{font-size:18px;color:var(--side-fg-soft);transition:color var(--t) ease;}
.nav__item:hover{background:rgba(255,255,255,.055);color:var(--side-fg-on);}
.nav__item:active{transform:scale(.985);}
.nav__item[aria-current="page"]{background:rgba(122,165,255,.16);color:var(--side-fg-on);}
.nav__item[aria-current="page"] .ico{color:#7aa5ff;}
.nav__count{margin-left:auto;font-size:11px;font-weight:700;color:var(--side-fg-soft);
  background:rgba(255,255,255,.07);padding:1px 8px;border-radius:var(--r-pill);}
.nav__item[aria-current="page"] .nav__count{color:#7aa5ff;background:rgba(122,165,255,.14);}

.side__foot{margin-top:auto;display:flex;align-items:center;gap:10px;padding:10px 8px 2px;border-top:1px solid rgba(255,255,255,.08);}
.side__avatar{width:32px;height:32px;border-radius:50%;background:#2a3c66;color:var(--side-fg-on);
  display:grid;place-items:center;font-weight:700;font-size:12.5px;flex-shrink:0;}
.side__who b{color:var(--side-fg-on);font-size:12.5px;display:block;font-weight:700;}
.side__who span{font-size:11px;color:var(--side-fg-soft);}

/* ── main ─────────────────────────────────────────────────────────────────── */
.main{display:flex;flex-direction:column;min-width:0;}
.topbar{
  position:sticky;top:0;z-index:20;
  display:flex;align-items:center;gap:14px;flex-wrap:wrap;
  padding:13px clamp(16px,3vw,30px);
  background:rgba(234,238,245,.86);backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line);
}
.topbar__title{font-family:'Outfit',sans-serif;font-weight:700;font-size:19px;letter-spacing:-.3px;}
.topbar__crumb{font-size:12.5px;color:var(--muted);font-weight:600;}
.seg{display:flex;gap:3px;margin-left:auto;background:var(--surface-2);padding:3px;border-radius:var(--r-pill);border:1px solid var(--line);}
.seg__btn{display:inline-flex;align-items:center;gap:6px;border:0;background:transparent;cursor:pointer;
  padding:7px 13px;border-radius:var(--r-pill);font-weight:600;font-size:12.5px;color:var(--ink-2);
  transition:background var(--t) ease,color var(--t) ease;white-space:nowrap;}
.seg__btn .ico{font-size:15px;color:var(--muted);}
.seg__btn:hover{color:var(--ink);}
.seg__btn:active{transform:scale(.97);}
.seg__btn[aria-pressed="true"]{background:var(--navy);color:var(--side-fg-on);box-shadow:var(--sh-1);}
.seg__btn[aria-pressed="true"] .ico{color:#7aa5ff;}

.content{padding:clamp(16px,2.4vw,26px) clamp(16px,3vw,30px);max-width:1180px;width:100%;}

/* view enter (opacity + translateY, < 300ms) */
.view{animation:viewIn 240ms var(--ease) both;}
@keyframes viewIn{from{opacity:0;transform:translateY(8px);}}

/* ── cards / grid ───────────────────────────────────────────────────────────
   sem card aninhado: todo card é filho direto de .grid/.content. */
.grid{display:grid;gap:14px;}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-card);box-shadow:var(--sh-1);}
.card__head{display:flex;align-items:center;gap:10px;padding:16px 18px 0;}
.card__title{font-family:'Outfit',sans-serif;font-weight:700;font-size:15px;letter-spacing:-.2px;}
.card__title .ico{font-size:17px;color:var(--accent-ink);vertical-align:-.18em;margin-right:7px;}
.card__sub{font-size:12px;color:var(--muted);font-weight:500;}
.card__act{margin-left:auto;}

/* KPIs */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.kpi{padding:16px 17px;}
.kpi__top{display:flex;align-items:center;gap:9px;}
.kpi__ico{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;font-size:18px;flex-shrink:0;}
.kpi__label{font-size:12px;color:var(--muted);font-weight:600;}
.kpi__val{font-family:'Outfit',sans-serif;font-weight:800;font-size:26px;letter-spacing:-.8px;margin-top:11px;color:var(--ink);font-variant-numeric:tabular-nums;}
.kpi__delta{font-size:11.5px;font-weight:700;margin-top:3px;display:inline-flex;align-items:center;gap:4px;}
.kpi__delta .ico{font-size:13px;}
.up{color:var(--success-ink);}
.down{color:var(--danger-ink);}

/* chart (barras, crescem com scaleY) */
.chart{padding:6px 18px 18px;}
.bars{display:flex;align-items:flex-end;gap:clamp(6px,1.4vw,16px);height:180px;padding-top:16px;}
.bar{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;height:100%;justify-content:flex-end;}
.bar__col{width:100%;max-width:46px;border-radius:7px 7px 3px 3px;background:linear-gradient(180deg,#3b82f6,var(--accent));
  transform:scaleY(0);transform-origin:bottom;animation:barGrow 520ms var(--ease) both;position:relative;cursor:default;}
.bar:last-child .bar__col{background:linear-gradient(180deg,#34d399,var(--success));}
.bar__col:hover .bar__tip{opacity:1;transform:translate(-50%,-6px);}
.bar__tip{position:absolute;bottom:100%;left:50%;transform:translate(-50%,0);opacity:0;pointer-events:none;
  background:var(--navy);color:var(--side-fg-on);font-size:11px;font-weight:700;padding:5px 9px;border-radius:7px;
  white-space:nowrap;transition:opacity var(--t) ease,transform var(--t) var(--ease);box-shadow:var(--sh-2);}
.bar__lab{font-size:11px;color:var(--muted);font-weight:600;}
@keyframes barGrow{from{transform:scaleY(0);}}

/* listas / tabelas com divide-y */
.rows{display:flex;flex-direction:column;}
.row{display:flex;align-items:center;gap:13px;padding:13px 18px;border-top:1px solid var(--line);
  transition:background var(--t) ease;text-align:left;}
.rows>.row:first-child{border-top:0;}
.row--btn{width:100%;background:transparent;border-left:0;border-right:0;border-bottom:0;cursor:pointer;}
.row--btn:hover{background:var(--surface-2);}
.row--btn:active{transform:scale(.996);}
.row.is-active{background:var(--accent-soft);}
.avatar{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;font-weight:700;font-size:13px;flex-shrink:0;
  background:var(--surface-2);color:var(--ink-2);}
.row__main{min-width:0;flex:1;}
.row__name{font-weight:700;font-size:13.5px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.row__sub{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.row__meta{margin-left:auto;text-align:right;flex-shrink:0;display:flex;align-items:center;gap:10px;}
.row__val{font-family:'Outfit',sans-serif;font-weight:700;font-size:13.5px;font-variant-numeric:tabular-nums;}

/* badges */
.badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:var(--r-pill);white-space:nowrap;}
.badge .ico{font-size:13px;}
.b-ok{background:var(--success-soft);color:var(--success-ink);}
.b-wait{background:var(--amber-soft);color:var(--amber-ink);}
.b-info{background:var(--accent-soft);color:var(--accent-ink);}
.b-mut{background:var(--surface-2);color:var(--ink-2);}

/* botões */
.btn{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);background:var(--surface);
  color:var(--ink);font-weight:600;font-size:13px;padding:8px 14px;border-radius:var(--r-sm);cursor:pointer;
  transition:background var(--t) ease,border-color var(--t) ease,transform var(--t) var(--ease);}
.btn .ico{font-size:16px;}
.btn:hover{background:var(--surface-2);}
.btn:active{transform:scale(.97);}
.btn--pri{background:var(--accent);border-color:var(--accent);color:var(--side-fg-on);box-shadow:0 6px 14px rgba(37,99,235,.28);}
.btn--pri:hover{background:var(--accent-ink);}
.btn--sm{padding:6px 11px;font-size:12px;}

/* toolbar de busca / filtro */
.toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:14px 18px;border-bottom:1px solid var(--line);}
.field{display:flex;align-items:center;gap:8px;background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r-sm);
  padding:8px 12px;flex:1;min-width:180px;transition:border-color var(--t) ease,background var(--t) ease;}
.field:focus-within{border-color:var(--accent);background:var(--surface);}
.field .ico{font-size:17px;color:var(--muted);flex-shrink:0;}
.field input{border:0;background:transparent;outline:0;flex:1;font:inherit;font-size:14px;color:var(--ink);min-width:0;}
.field input::placeholder{color:#9aa6bb;}
select.sel{border:1px solid var(--line);background:var(--surface);border-radius:var(--r-sm);padding:8px 12px;font:inherit;
  font-size:13px;font-weight:600;color:var(--ink);cursor:pointer;}

/* segmented toggle (semana/dia) */
.tabs{display:inline-flex;gap:2px;background:var(--surface-2);border:1px solid var(--line);padding:3px;border-radius:var(--r-sm);}
.tabs button{border:0;background:transparent;cursor:pointer;padding:6px 14px;border-radius:7px;font-weight:600;font-size:12.5px;color:var(--ink-2);
  transition:background var(--t) ease,color var(--t) ease;}
.tabs button:active{transform:scale(.97);}
.tabs button[aria-pressed="true"]{background:var(--surface);color:var(--ink);box-shadow:var(--sh-1);}

/* agenda grid */
.cal{overflow:auto;padding:6px 6px 10px;}
.cal__grid{display:grid;grid-template-columns:56px repeat(6,minmax(112px,1fr));min-width:720px;}
.cal__h{position:sticky;top:0;background:var(--surface);padding:10px 8px;text-align:center;font-weight:700;font-size:12px;
  border-bottom:1px solid var(--line);z-index:2;}
.cal__h span{display:block;font-size:10.5px;color:var(--muted);font-weight:600;}
.cal__h--today{color:var(--accent-ink);}
.cal__t{font-size:11px;color:var(--muted);font-weight:600;padding:8px;text-align:right;border-bottom:1px solid var(--line);border-right:1px solid var(--line);}
.cell{border-bottom:1px solid var(--line);border-right:1px solid var(--line);min-height:52px;padding:4px;position:relative;
  cursor:pointer;transition:background var(--t) ease;}
.cell:hover{background:var(--surface-2);}
.cell:hover .cell__add{opacity:1;}
.cell__add{position:absolute;inset:4px;border:1px dashed #b9c6dd;border-radius:8px;display:grid;place-items:center;
  color:var(--accent-ink);font-size:16px;opacity:0;transition:opacity var(--t) ease;pointer-events:none;}
.appt{border:0;width:100%;text-align:left;cursor:pointer;border-radius:8px;padding:6px 8px;margin-bottom:3px;
  background:var(--accent-soft);color:var(--accent-ink);transition:transform var(--t) var(--ease),box-shadow var(--t) ease;
  animation:apptIn 220ms var(--ease) both;}
.appt:hover{box-shadow:var(--sh-1);}
.appt:active{transform:scale(.97);}
.appt.paid{background:var(--success-soft);color:var(--success-ink);}
.appt__t{font-size:10.5px;font-weight:700;opacity:.85;}
.appt__n{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.appt__s{font-size:10.5px;font-weight:600;opacity:.8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.appt__pay{display:inline-flex;align-items:center;gap:3px;margin-top:2px;font-size:10px;font-weight:700;}
.appt__pay .ico{font-size:12px;}
@keyframes apptIn{from{opacity:0;transform:scale(.94);}}

.cal__legend{display:flex;gap:16px;flex-wrap:wrap;padding:12px 18px;border-top:1px solid var(--line);font-size:12px;color:var(--muted);font-weight:600;}
.dotlg{display:inline-flex;align-items:center;gap:6px;}
.dotlg i{width:11px;height:11px;border-radius:4px;display:inline-block;}

/* dia view */
.dayhead{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--line);}
.dayhead h3{font-family:'Outfit',sans-serif;font-size:15px;font-weight:700;}

/* financeiro table */
.ftable{width:100%;}
.ft__row{display:grid;grid-template-columns:74px 1fr 120px 116px 116px;align-items:center;gap:12px;
  padding:11px 18px;border-top:1px solid var(--line);font-size:13px;}
.rows>.ft__row:first-child{border-top:0;}
.ft__head{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:700;background:var(--surface-2);border-radius:0;}
.ft__date{color:var(--muted);font-weight:600;font-variant-numeric:tabular-nums;}
.ft__desc b{font-weight:700;display:block;color:var(--ink);}
.ft__desc span{font-size:11.5px;color:var(--muted);}
.ft__amt{text-align:right;font-family:'Outfit',sans-serif;font-weight:700;font-variant-numeric:tabular-nums;}
.ft__bal{text-align:right;font-weight:600;color:var(--ink-2);font-variant-numeric:tabular-nums;}
.amt-in{color:var(--success-ink);}
.amt-out{color:var(--danger-ink);}

/* mini-detalhe do cliente */
.detail__head{display:flex;align-items:center;gap:12px;padding:18px;border-bottom:1px solid var(--line);}
.detail__av{width:48px;height:48px;border-radius:13px;display:grid;place-items:center;font-weight:800;font-size:16px;
  background:var(--accent-soft);color:var(--accent-ink);flex-shrink:0;}
.detail__name{font-family:'Outfit',sans-serif;font-weight:700;font-size:17px;letter-spacing:-.2px;}
.detail__sub{font-size:12.5px;color:var(--muted);font-weight:600;}
.detail__stats{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);}
.detail__stat{background:var(--surface);padding:14px 18px;}
.detail__stat b{font-family:'Outfit',sans-serif;font-size:19px;font-weight:700;display:block;letter-spacing:-.4px;}
.detail__stat span{font-size:11.5px;color:var(--muted);font-weight:600;}
.detail__list{padding:6px 0;}
.dl{display:flex;align-items:center;gap:10px;padding:9px 18px;font-size:12.5px;}
.dl .ico{font-size:16px;color:var(--muted);}
.dl b{margin-left:auto;font-weight:700;color:var(--ink-2);}
.detail__empty{padding:44px 18px;text-align:center;color:var(--muted);}
.detail__empty .ico{font-size:30px;opacity:.5;}
.detail__empty p{margin-top:10px;font-size:13px;font-weight:600;}

/* empty state */
.empty{padding:46px 24px;text-align:center;}
.empty__ico{width:56px;height:56px;border-radius:16px;background:var(--surface-2);color:var(--muted);
  display:grid;place-items:center;font-size:26px;margin:0 auto 14px;}
.empty h4{font-family:'Outfit',sans-serif;font-size:15px;font-weight:700;}
.empty p{font-size:13px;color:var(--muted);margin-top:5px;max-width:320px;margin-inline:auto;}

/* skeleton (só opacity/transform na animação) */
.sk{background:var(--surface-2);border-radius:7px;position:relative;overflow:hidden;}
.sk::after{content:"";position:absolute;inset:0;transform:translateX(-100%);
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.6),transparent);animation:shimmer 1.25s infinite;}
.sk-line{height:11px;}
.sk-chip{width:38px;height:38px;border-radius:11px;flex-shrink:0;}
@keyframes shimmer{100%{transform:translateX(100%);}}

.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip-path:inset(50%);white-space:nowrap;}
.foot-note{padding:16px 4px 6px;font-size:11.5px;color:var(--muted);text-align:center;}

/* responsivo */
@media (max-width:960px){
  .app{grid-template-columns:64px 1fr;}
  .brand__name,.brand__sub,.nav__cap,.nav__item span.lbl,.nav__count,.side__who{display:none;}
  .brand{justify-content:center;padding:6px 0 16px;}
  .nav__item{justify-content:center;padding:12px 0;}
  .side__foot{justify-content:center;}
  .kpis{grid-template-columns:repeat(2,1fr);}
}
@media (max-width:620px){
  .kpis{grid-template-columns:repeat(2,1fr);}
  .ft__row{grid-template-columns:1fr auto;}
  .ft__date,.ft__bal{display:none;}
  .seg__btn span{display:none;}
}

@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important;}
  .view{animation:none;}
  .btn:active,.appt:active,.nav__item:active,.seg__btn:active,.row--btn:active,.tabs button:active{transform:none;}
}

/* ── mobile real (<=720px): sidebar vira barra inferior, 1 coluna, alvos 44px ──
   Aberto em tela cheia no celular. min-height:100dvh no shell (nada de h-screen),
   grid (não flex-math), inputs 16px (sem zoom iOS), safe-area na barra inferior. */
@media (max-width:720px){
  .app{grid-template-columns:1fr;}

  /* a navegação sai da lateral e vira uma barra inferior fixa (tab bar) */
  .side{
    position:fixed;left:0;right:0;bottom:0;top:auto;
    height:auto;flex-direction:row;align-items:stretch;gap:2px;z-index:60;
    padding:6px 6px calc(6px + env(safe-area-inset-bottom));
    border-top:1px solid rgba(255,255,255,.09);
  }
  .brand,.nav__cap,.side__foot{display:none;}
  .nav{flex-direction:row;flex:1;gap:2px;margin:0;}
  .app .nav__item{
    flex:1;flex-direction:column;justify-content:center;gap:3px;text-align:center;
    padding:7px 4px;min-height:52px;border-radius:10px;
  }
  .app .nav__item .lbl{display:block;font-size:11px;font-weight:600;}
  .app .nav__item .ico{font-size:21px;}
  .nav__count{display:none;}

  /* conteúdo em 1 coluna; espaço pra barra inferior não cobrir nada */
  .main{min-width:0;}
  .content{max-width:none;padding:16px 14px calc(76px + env(safe-area-inset-bottom));}
  .content .grid{grid-template-columns:1fr !important;}
  .kpis{grid-template-columns:repeat(2,1fr);}
  .kpi__val{font-size:22px;}
  .topbar{padding:12px 14px;}
  .topbar__title{font-size:17px;}

  /* alvos de toque >=44px e inputs/selects a 16px (evita zoom no iOS) */
  .btn,.seg__btn,.tabs button,.sel{min-height:44px;}
  .field{min-height:44px;}
  .field input,.sel{font-size:16px;}

  /* financeiro: reflow em 2 colunas (data e saldo saem, valor fica) */
  .ft__row{grid-template-columns:1fr auto;}
  .ft__head{font-size:10.5px;}
  .ft__date,.ft__bal{display:none;}
}

function switchSeg(k){

/* ── router de view (skeleton no load, fade rápido no resto) ─────────────────── */
let loaded = false;
function renderView(refetch){
  if(!loaded || refetch){
    content.innerHTML = '';
    content.appendChild(skeletonFor(state.view));
    setTimeout(()=>{ loaded=true; paint(); }, 620);
  } else {
    paint();
  }
}
function paint(){
  content.innerHTML='';
  const v = document.createElement('div');
  v.className='view';
  ({dashboard:viewDashboard, agenda:viewAgenda, clientes:viewClientes, financeiro:viewFinanceiro}[state.view])(v);
  content.appendChild(v);
  if(state.view==='dashboard'){ runCountUp(); }
}

function runCountUp(){
  const reduce = matchMedia('(prefers-reduced-motion:reduce)').matches;
  content.querySelectorAll('[data-count]').forEach(node=>{
    const target = +node.dataset.count, cur = node.dataset.cur==='1', pct = node.dataset.pct==='1';
    const fmt = x => cur ? BRL(x) : pct ? INT(Math.round(x))+'%' : INT(Math.round(x));
    if(reduce){ node.textContent = fmt(target); return; }
    const dur = 900, t0 = performance.now();
    const step = now=>{
      const p = Math.min(1,(now-t0)/dur);
      const e = 1-Math.pow(1-p,3); // ease-out cúbico
      node.textContent = fmt(cur ? target*e : Math.round(target*e));
      if(p<1) requestAnimationFrame(step);
      else node.textContent = fmt(target);
    };
    requestAnimationFrame(step);
  });
}

function agWeek(body){
  const cal = el('<div class="cal"><div class="cal__grid"></div></div>');
  const g = cal.firstElementChild;
  g.appendChild(el('<div class="cal__h" style="border-right:1px solid var(--line)"></div>'));
  DIAS.forEach((dia,i)=> g.appendChild(el(`<div class="cal__h ${i===TODAY?'cal__h--today':''}">${dia}<span>${DATAS[i]}</span></div>`)));
  HORAS.forEach((hora,hi)=>{
    g.appendChild(el(`<div class="cal__t">${hora}</div>`));
    DIAS.forEach((_,di)=>{
      const cell = el('<div class="cell"></div>');
      const here = state.agenda.filter(a=>a.dia===di && a.h===hi);
      here.forEach(a=> cell.appendChild(apptBlock(a)));
      if(!here.length) cell.appendChild(el('<div class="cell__add"><svg class="ico"><use href="#i-plus"/></svg></div>'));
      cell.onclick = (e)=>{ if(e.target.closest('.appt')) return; addAppt(di,hi); };
      g.appendChild(cell);
    });
  });
  body.appendChild(cal);
  body.appendChild(legend());
}

function agDay(body){
  const list = state.agenda.filter(a=>a.dia===state.agDay).sort((a,b)=>a.h-b.h);
  const head = el(`<div class="dayhead">
    <button class="btn btn--sm" data-n="-1"><svg class="ico"><use href="#i-chevL"/></svg></button>
    <h3>${DIAS[state.agDay]}, ${DATAS[state.agDay]}</h3>
    <button class="btn btn--sm" data-n="1"><svg class="ico"><use href="#i-chevR"/></svg></button>
    <button class="btn btn--pri btn--sm" style="margin-left:auto" id="addDay"><svg class="ico"><use href="#i-plus"/></svg>Agendar</button>
  </div>`);
  head.querySelector('[data-n="-1"]').onclick=()=>{ state.agDay=(state.agDay+5)%6; paint(); };
  head.querySelector('[data-n="1"]').onclick=()=>{ state.agDay=(state.agDay+1)%6; paint(); };
  head.querySelector('#addDay').onclick=()=>{ const slot=firstFree(state.agDay); addAppt(state.agDay, slot); };
  body.appendChild(head);

  if(!list.length){
    body.appendChild(emptyState('i-calplus','Nenhum agendamento neste dia','Toque em "Agendar" para reservar um horário ou volte para a visão de semana.'));
    return;
  }
  const rows = el('<div class="rows"></div>');
  list.forEach(a=>{
    const r = el(`<button class="row row--btn">
      <div class="avatar" style="background:${a.pago?'var(--success-soft)':'var(--accent-soft)'};color:${a.pago?'var(--success-ink)':'var(--accent-ink)'}"><svg class="ico"><use href="#i-clock"/></svg></div>
      <div class="row__main"><div class="row__name">${HORAS[a.h]} · ${a.nome}</div><div class="row__sub">${a.serv}</div></div>
      <div class="row__meta"><span class="row__val">${a.valor?BRL(a.valor):'cortesia'}</span>
        ${a.pago?'<span class="badge b-ok"><svg class="ico"><use href="#i-check2"/></svg>pago</span>':'<span class="badge b-wait"><svg class="ico"><use href="#i-clock"/></svg>a receber</span>'}</div>
    </button>`);
    r.onclick = ()=>{ a.pago=!a.pago; paint(); };
    rows.appendChild(r);
  });
  body.appendChild(rows);
}

function apptBlock(a){
  const b = el(`<button class="appt ${a.pago?'paid':''}">
    <div class="appt__t">${HORAS[a.h]}</div>
    <div class="appt__n">${a.nome}</div>
    <div class="appt__s">${a.serv}</div>
    <div class="appt__pay"><svg class="ico"><use href="#${a.pago?'i-check2':'i-clock'}"/></svg>${a.pago?'pago':'a receber'}</div>
  </button>`);
  b.onclick = (e)=>{ e.stopPropagation(); a.pago=!a.pago; paint(); };
  return b;
}
function firstFree(dia){
  for(let h=0;h<HORAS.length;h++) if(!state.agenda.some(a=>a.dia===dia&&a.h===h)) return h;
  return 0;
}
let addIdx = 0;
function addAppt(dia,h){
  if(state.agenda.some(a=>a.dia===dia&&a.h===h)) return;
  const d = data();
  const cli = d.lista[addIdx % d.lista.length];
  const serv = d.servicos[addIdx % d.servicos.length];
  addIdx++;
  state.agenda.push({dia,h,nome:cli.nome.split(' ')[0]+(d===SEG.vet?'':' '+ (cli.nome.split(' ')[1]||'')),serv:serv.nome,valor:serv.valor,pago:false});
  renderNav();
  paint();
}
function legend(){
  return el(`<div class="cal__legend">
    <span class="dotlg"><i style="background:var(--accent-soft)"></i>a receber</span>

    <span class="dotlg"><i style="border:1px dashed #b9c6dd;background:transparent"></i>horário livre</span>

}

    </div>
    <div style="padding:0 18px 18px;display:flex;gap:8px">
      <button class="btn btn--pri btn--sm" style="flex:1"><svg class="ico"><use href="#i-calplus"/></svg>Agendar</button>
      <button class="btn btn--sm" style="flex:1"><svg class="ico"><use href="#i-arrow"/></svg>Abrir ficha</button>
    </div>
  </div>`));
  box.querySelector('.btn--pri').onclick = ()=>go('agenda');
}

/* ── FINANCEIRO ────────────────────────────────────────────────────────────── */
function viewFinanceiro(root){
  const opts = Object.keys(MESES).map(m=>`<option value="${m}" ${state.mes===m?'selected':''}>${MESES[m]}</option>`).join('');
  const wrap = el(`<div>
    <div class="grid" style="grid-template-columns:repeat(3,1fr)" id="finSum"></div>
    <div class="card" style="margin-top:14px">
      <div class="toolbar">
        <div class="card__title"><svg class="ico"><use href="#i-wallet"/></svg>Transações</div>
        <select class="sel card__act" id="mes" aria-label="Filtrar por mês">${opts}</select>
      </div>
      <div id="finRows"></div>
    </div>
  </div>`);
  wrap.querySelector('#mes').addEventListener('change', e=>{ state.mes=e.target.value; fillFin(wrap); });
  root.appendChild(wrap);
  fillFin(wrap);
  root.appendChild(footNote());
}
function fillFin(wrap){
  const list = (data().fin[state.mes]||[]).slice();
  const entradas = list.filter(t=>t.tipo==='in').reduce((s,t)=>s+t.valor,0);
  const saidas = list.filter(t=>t.tipo==='out').reduce((s,t)=>s+t.valor,0);
  const saldo = entradas - saidas;

  const sum = wrap.querySelector('#finSum');
  sum.innerHTML='';
  [
    {lb:'Entradas', v:entradas, cls:'amt-in', bg:'var(--success-soft)', fg:'var(--success-ink)', ic:'i-trend'},
    {lb:'Saídas', v:saidas, cls:'amt-out', bg:'var(--danger-soft)', fg:'var(--danger-ink)', ic:'i-wallet'},
    {lb:'Saldo do mês', v:saldo, cls:saldo>=0?'amt-in':'amt-out', bg:'var(--accent-soft)', fg:'var(--accent-ink)', ic:'i-check'},
  ].forEach(s=> sum.appendChild(el(`<div class="card kpi">
    <div class="kpi__top"><div class="kpi__ico" style="background:${s.bg};color:${s.fg}"><svg class="ico"><use href="#${s.ic}"/></svg></div>
      <div class="kpi__label">${s.lb}</div></div>
    <div class="kpi__val ${s.cls}" style="font-size:23px">${BRL(s.v)}</div>
  </div>`)));

  const box = wrap.querySelector('#finRows');
  box.innerHTML='';
  if(!list.length){
    box.appendChild(emptyState('i-inbox','Nenhuma transação em '+MESES[state.mes],'Escolha outro mês no filtro acima para ver o movimento.'));
    return;
  }
  const rows = el('<div class="rows"></div>');
  rows.appendChild(el(`<div class="ft__row ft__head"><span>Data</span><span>Descrição</span><span style="text-align:right">Tipo</span><span style="text-align:right">Valor</span><span style="text-align:right">Saldo</span></div>`));
  let run = 0;
  list.slice().reverse().forEach(t=>{ run += (t.tipo==='in'?t.valor:-t.valor); t._run = run; });
  list.forEach(t=>{
    rows.appendChild(el(`<div class="ft__row">
      <span class="ft__date">${t.data}</span>
      <span class="ft__desc"><b>${t.desc}</b><span>${t.cli}</span></span>
      <span style="text-align:right">${t.tipo==='in'?'<span class="badge b-ok">entrada</span>':'<span class="badge b-mut">saída</span>'}</span>
      <span class="ft__amt ${t.tipo==='in'?'amt-in':'amt-out'}">${t.tipo==='in'?'+':'-'} ${BRL(t.valor)}</span>
      <span class="ft__bal">${BRL(t._run)}</span>
    </div>`));
  });
  box.appendChild(rows);
}

/* ── util UI ───────────────────────────────────────────────────────────────── */
function emptyState(ic,titulo,texto){
  return el(`<div class="empty"><div class="empty__ico"><svg class="ico"><use href="#${ic}"/></svg></div>
    <h4>${titulo}</h4><p>${texto}</p></div>`);
}
function footNote(){
  return el('<p class="foot-note">Demonstração navegável · dados fictícios · nenhuma informação real de cliente</p>');
}

/* ── boot ──────────────────────────────────────────────────────────────────── */
/* no celular a agenda abre no modo "Dia" (lista com alvos grandes) em vez da
   grade semanal apertada; o desktop segue na semana. */
if(window.matchMedia('(max-width:720px)').matches){ state.agView='dia'; }
renderSeg(); renderNav(); setTitle(); renderView();
</script>
